<div style="padding: 16px; max-width: 600px; margin: 0 auto;">
    <!-- Search Bar -->
    <div style="background: white; border-radius: 40px; padding: 12px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <i class="fas fa-search" style="color: #1877f2;"></i>
        <input type="text" placeholder="Search Goans..." style="border: none; outline: none; flex: 1; font-size: 1rem;" id="searchInput">
    </div>

    <!-- Only Goans Verified Badge -->
    <div style="background: linear-gradient(145deg, #1877f2, #0a5cff); border-radius: 30px; padding: 12px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; color: white;">
        <i class="fas fa-check-circle" style="font-size: 1.5rem;"></i>
        <div style="flex: 1;">
            <h3 style="font-size: 1rem; font-weight: 600;">Only Goans Community</h3>
            <p style="font-size: 0.8rem; opacity: 0.9;">Verified Goan profiles only</p>
        </div>
        <span style="background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 40px; font-size: 0.7rem;">2 free messages</span>
    </div>

    <!-- Category Chips -->
    <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 16px;">
        <span style="background: #1877f2; color: white; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; white-space: nowrap;">All Goans</span>
        <span style="background: #f0f2f5; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; white-space: nowrap;">North Goa</span>
        <span style="background: #f0f2f5; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; white-space: nowrap;">South Goa</span>
        <span style="background: #f0f2f5; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; white-space: nowrap;">Artists</span>
        <span style="background: #f0f2f5; padding: 8px 18px; border-radius: 40px; font-size: 0.85rem; white-space: nowrap;">Foodies</span>
    </div>

    <!-- People Cards -->
    <div id="peopleContainer">
        <!-- Card 1 -->
        <div style="background: white; border-radius: 24px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div style="display: flex; padding: 16px; gap: 16px;">
                <div style="width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(145deg, #1877f2, #0a5cff); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">
                    <i class="fas fa-user"></i>
                </div>
                <div style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                        <h3 style="font-size: 1.1rem; font-weight: 600;">Rohan Pereira</h3>
                        <i class="fas fa-check-circle" style="color: #1877f2; font-size: 0.9rem;"></i>
                        <span style="background: #e7f3ff; color: #1877f2; padding: 2px 8px; border-radius: 40px; font-size: 0.6rem;">Goan</span>
                    </div>
                    <p style="color: #65676b; font-size: 0.85rem; margin-bottom: 4px;"><i class="fas fa-map-marker-alt" style="margin-right: 4px;"></i> Panjim</p>
                    <p style="color: #1c1e21; font-size: 0.9rem; margin-bottom: 8px;">Surfer | Foodie | Love beach sunsets 🌊</p>
                    <div style="display: flex; gap: 8px;">
                        <button style="background: #1877f2; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; flex: 1;">Message</button>
                        <button style="background: #f0f2f5; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                            <i class="fas fa-heart" style="color: #f23b5c;"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Card 2 -->
        <div style="background: white; border-radius: 24px; margin-bottom: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div style="display: flex; padding: 16px; gap: 16px;">
                <div style="width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(145deg, #f23b5c, #ff6b6b); display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem;">
                    <i class="fas fa-user"></i>
                </div>
                <div style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                        <h3 style="font-size: 1.1rem; font-weight: 600;">Anjali Naik</h3>
                        <i class="fas fa-check-circle" style="color: #1877f2; font-size: 0.9rem;"></i>
                        <span style="background: #e7f3ff; color: #1877f2; padding: 2px 8px; border-radius: 40px; font-size: 0.6rem;">Goan</span>
                    </div>
                    <p style="color: #65676b; font-size: 0.85rem; margin-bottom: 4px;"><i class="fas fa-map-marker-alt" style="margin-right: 4px;"></i> Margao</p>
                    <p style="color: #1c1e21; font-size: 0.9rem; margin-bottom: 8px;">Artist | Yoga teacher | Nature lover 🌿</p>
                    <div style="display: flex; gap: 8px;">
                        <button style="background: #1877f2; color: white; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; font-size: 0.85rem; cursor: pointer; flex: 1;">Message</button>
                        <button style="background: #f0f2f5; border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                            <i class="fas fa-heart" style="color: #f23b5c;"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('searchInput')?.addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('[style*="border-radius: 24px"]').forEach(card => {
            const name = card.querySelector('h3')?.innerText.toLowerCase() || '';
            card.style.display = name.includes(term) || term === '' ? 'block' : 'none';
        });
    });
</script>
