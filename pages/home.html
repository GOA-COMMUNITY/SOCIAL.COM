<!-- Stories -->
<div class="stories-section">
    <div class="section-header"><h3>LIVE NOW</h3><a href="#">View all <i class="fas fa-chevron-right"></i></a></div>
    <div class="stories-scroll" id="liveStories"></div>
</div>

<!-- Categories -->
<div class="categories-section">
    <div class="chips-scroll">
        <span class="chip active">All</span> <span class="chip">Trending</span> <span class="chip">Local</span>
        <span class="chip">News</span> <span class="chip">Shorts</span> <span class="chip">Events</span>
        <span class="chip">Food</span> <span class="chip">Travel</span>
    </div>
</div>

<!-- Main Feed -->
<div class="feed-container" id="feedContainer">
    <div id="loading">Loading videos...</div>
</div>

<!-- Error Display -->
<div id="errorDisplay" style="margin: 20px; padding: 20px; background: #ffebee; border: 2px solid #f44336; border-radius: 10px; color: #b71c1c; display: none;"></div>

<style>
    /* Keep your existing styles - I'm showing minimal for brevity */
    .stories-section { padding: 16px; background: white; margin: 8px 0; }
    .section-header { display: flex; justify-content: space-between; }
    .stories-scroll { display: flex; gap: 16px; overflow-x: auto; }
    .story-item { min-width: 90px; text-align: center; }
    .story-avatar { width: 80px; height: 80px; border-radius: 50%; background: #e4e6eb; margin: 0 auto; border: 3px solid #1877f2; }
    .categories-section { padding: 12px 16px; background: white; }
    .chips-scroll { display: flex; gap: 10px; overflow-x: auto; }
    .chip { background: #f0f2f5; padding: 8px 18px; border-radius: 40px; }
    .feed-container { max-width: 600px; margin: 0 auto; padding: 8px 0; }
    .feed-card { background: white; border-radius: 16px; margin: 0 12px 16px; overflow: hidden; }
    .video-container { width: 100%; aspect-ratio: 9/16; background: #000; }
    .video-container iframe { width: 100%; height: 100%; border: none; }
    .card-footer { padding: 14px; display: flex; gap: 24px; }
</style>

<script>
    async function loadFeed() {
        const loading = document.getElementById('loading');
        const errorDiv = document.getElementById('errorDisplay');
        const feedContainer = document.getElementById('feedContainer');

        try {
            loading.innerText = 'Trying to fetch videos.json...';
            
            // Try multiple paths
            const paths = [
                '../videos.json',
                'videos.json',
                'https://goa-community.github.io/SOCIAL.COM/videos.json'
            ];
            
            let response = null;
            let successPath = '';
            
            for (const path of paths) {
                try {
                    loading.innerText = `Trying: ${path}`;
                    const res = await fetch(path);
                    if (res.ok) {
                        response = res;
                        successPath = path;
                        break;
                    }
                } catch (e) {
                    console.log(`Failed: ${path}`);
                }
            }
            
            if (!response) {
                throw new Error('Could not fetch videos.json from any path');
            }
            
            loading.innerText = `Found at ${successPath}`;
            const data = await response.json();
            
            loading.innerText = `Loaded ${data.length} videos`;
            
            // Clear loading
            feedContainer.innerHTML = '';
            
            // Display first video ID as proof
            const proof = document.createElement('div');
            proof.style.padding = '20px';
            proof.style.background = '#e8f5e8';
            proof.style.border = '2px solid #4caf50';
            proof.style.borderRadius = '10px';
            proof.innerHTML = `<h3>✅ SUCCESS!</h3><p>Found ${data.length} videos</p><p>First video ID: ${data[0]?.videoId}</p><p>Path: ${successPath}</p>`;
            feedContainer.appendChild(proof);
            
        } catch (error) {
            loading.style.display = 'none';
            errorDiv.style.display = 'block';
            errorDiv.innerHTML = `<h3>❌ ERROR</h3><p>${error.message}</p>`;
        }
    }

    // Simple stories
    document.getElementById('liveStories').innerHTML = `
        <div class="story-item"><div class="story-avatar"><div class="story-avatar-inner">📱</div></div><div class="story-label">Test</div></div>
    `;

    loadFeed();
</script>
