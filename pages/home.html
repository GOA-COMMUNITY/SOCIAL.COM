<div class="content-pane">

<h2 style="margin-bottom:20px;">🔥 Verse Edits Videos</h2>

<div id="videoFeed"></div>

</div>

<script>

/* VerseEdits channel RSS */

const channel = "https://www.youtube.com/feeds/videos.xml?channel_id=UC8QqG6Jd9v7E3lR9Qh4QkFg"

async function loadVideos(){

let container = document.getElementById("videoFeed")

container.innerHTML = "Loading videos..."

let api = "https://api.rss2json.com/v1/api.json?rss_url=" + channel

let res = await fetch(api)

let data = await res.json()

container.innerHTML = ""

data.items.slice(0,8).forEach(video=>{

let id = video.link.split("v=")[1].split("&")[0]

container.innerHTML += `

<div class="card" style="padding:0;overflow:hidden">

<div style="position:relative;cursor:pointer"
onclick="playVideo('${id}', this)">

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg"
style="width:100%">

<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
background:rgba(0,0,0,0.6);
padding:12px 18px;
border-radius:50%;
color:white;">
▶
</div>

</div>

<div style="padding:16px">

<h3 style="font-size:1rem;margin-bottom:6px">
${video.title}
</h3>

<p style="font-size:0.75rem;color:#888">
${new Date(video.pubDate).toLocaleDateString()}
</p>

</div>

</div>

`

})

}

function playVideo(id, element){

element.outerHTML = `
<iframe
width="100%"
height="220"
src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>
`

}

loadVideos()

</script>
