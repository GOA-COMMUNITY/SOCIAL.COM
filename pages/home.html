<div style="padding: 20px; font-family: sans-serif;">
    <h2>🔍 Testing videos.json (with timeout)</h2>
    <div id="result">Starting...</div>
    <ul id="details" style="margin-top:20px; list-style-type: none; padding:0;"></ul>
</div>

<script>
    (async function() {
        const resultDiv = document.getElementById('result');
        const detailsUl = document.getElementById('details');

        function log(msg) {
            const li = document.createElement('li');
            li.textContent = msg;
            detailsUl.appendChild(li);
            console.log(msg);
        }

        // List of possible paths to try
        const paths = [
            '../videos.json',
            'videos.json',
            '/SOCIAL.COM/videos.json',
            './videos.json',
            'https://goa-community.github.io/SOCIAL.COM/videos.json'
        ];

        for (let path of paths) {
            log(`Trying: ${path}`);
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000); // 5 second timeout

            try {
                const response = await fetch(path, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (response.ok) {
                    const text = await response.text();
                    let data;
                    try {
                        data = JSON.parse(text);
                    } catch (e) {
                        log(`❌ Invalid JSON at ${path}: ${e.message}`);
                        continue;
                    }
                    resultDiv.innerHTML = `✅ SUCCESS! Found videos.json at ${path}`;
                    log(`File contains ${data.length} videos.`);
                    if (data.length > 0) {
                        log(`First video ID: ${data[0].videoId}`);
                    }
                    // Stop testing, we found it
                    return;
                } else {
                    log(`❌ HTTP ${response.status} at ${path}`);
                }
            } catch (error) {
                clearTimeout(timeoutId);
                if (error.name === 'AbortError') {
                    log(`⏱️ Timeout after 5s for ${path}`);
                } else {
                    log(`❌ Error: ${error.message} for ${path}`);
                }
            }
        }

        resultDiv.innerHTML = '❌ Could not load videos.json from any path.';
        log('All attempts failed.');
    })();
</script>
