<div style="padding: 20px; font-family: Arial;">
    <h2>Testing Fetch</h2>
    <div id="result">Loading...</div>
</div>

<script>
    fetch('../videos.json')  // ← THIS IS THE CORRECT PATH
        .then(response => {
            document.getElementById('result').innerHTML = '✅ Found! Status: ' + response.status;
            return response.json();
        })
        .then(data => {
            document.getElementById('result').innerHTML += '<br>✅ Loaded ' + data.length + ' videos';
        })
        .catch(error => {
            document.getElementById('result').innerHTML = '❌ Error: ' + error.message;
        });
</script>
