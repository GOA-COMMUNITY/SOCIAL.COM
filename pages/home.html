<div id="result"></div>

<script>
    async function test() {
        const result = document.getElementById('result');
        
        try {
            // Try absolute URL first
            const response = await fetch('https://goa-community.github.io/SOCIAL.COM/videos.json');
            
            if (response.ok) {
                const data = await response.json();
                result.innerHTML = `✅ Working! Found ${data.length} videos. First ID: ${data[0].videoId}`;
            } else {
                result.innerHTML = `❌ Failed: ${response.status}`;
            }
        } catch (e) {
            result.innerHTML = `❌ Error: ${e.message}`;
        }
    }
    
    test();
</script>
