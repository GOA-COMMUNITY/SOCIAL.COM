<!-- Simple test page -->
<div style="padding: 20px; font-family: sans-serif;">
    <h2>🔧 Testing Mode</h2>
    <div id="status">Loading...</div>
</div>

<script>
    // This is the ONLY JavaScript - nothing else
    document.getElementById('status').innerHTML = '✅ JavaScript is working!';
    
    // Now try to fetch
    fetch('https://goa-community.github.io/SOCIAL.COM/videos.json')
        .then(response => {
            document.body.innerHTML += '<div style="color:green">✅ Fetch succeeded!</div>';
            return response.json();
        })
        .then(data => {
            document.body.innerHTML += `<div>✅ Found ${data.length} videos</div>`;
        })
        .catch(error => {
            document.body.innerHTML += `<div style="color:red">❌ Fetch failed: ${error.message}</div>`;
        });
</script>
