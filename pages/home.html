    <div class="section-header"><h3>LIVE NOW</h3><a href="#">View all <i class="fas fa-chevron-right"></i></a></div>
    <div class="stories-scroll" id="liveStories"></div>
</div>

<!-- Categories -->
<div class="categories-section">
    <div class="chips-scroll">
        <span class="chip active">All</span> <span class="chip">Trending</span> <span class="chip">Local</span>
        <span class="chip">News</span> <span class="chip">Shorts</span> <span class="chip">Events</span>
        <span class="chip">Food</span> <span class="chip">Travel</span>
    </div>
</div>

<!-- Main Feed -->
<div class="feed-container" id="feedContainer">
    <div class="loading-indicator" id="loading"><i class="fas fa-circle-notch"></i><p>loading goa shorts...</p></div>
</div>

<!-- Share Popup -->
<div class="share-overlay" id="shareOverlay"></div>
<div class="share-popup" id="sharePopup">
    <div class="share-popup-header"><h3>Share to</h3><button class="close-share" id="closeShare">&times;</button></div>
    <div class="share-options">
        <div class="share-option" data-share="whatsapp"><div class="share-icon whatsapp"><i class="fab fa-whatsapp"></i></div><span>WhatsApp</span></div>
        <div class="share-option" data-share="instagram"><div class="share-icon instagram"><i class="fab fa-instagram"></i></div><span>Instagram</span></div>
        <div class="share-option" data-share="facebook"><div class="share-icon facebook"><i class="fab fa-facebook-f"></i></div><span>Facebook</span></div>
        <div class="share-option" data-share="copy"><div class="share-icon copy"><i class="fas fa-link"></i></div><span>Copy Link</span></div>
    </div>
</div>

<!-- YouTube Player Container (for shared videos) -->
<div class="youtube-player-container" id="youtubePlayerContainer">
    <div class="player-wrapper"><button class="close-player" id="closePlayerBtn">&times;</button><iframe id="youtubePlayer" allow="autoplay; fullscreen"></iframe></div>
</div>

<style>
    /* ===== STORIES & CATEGORIES ===== */
    .stories-section {
        padding: 16px 16px 12px 16px;
        background: white;
        margin: 8px 0;
    }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }
    .section-header h3 { font-size: 1.1rem; font-weight: 600; color: #1c1e21; }
    .section-header a { color: #1877f2; font-size: 0.9rem; text-decoration: none; font-weight: 500; }
    .stories-scroll {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        scrollbar-width: none;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;

    .stories-scroll::-webkit-scrollbar { display: none; }

    .story-avatar {

        border-radius: 50%;

        position: absolute;
        bottom: 4px; right: 4px;
        background: #ff0000;

    }
    .story-avatar-inner {
        width: 100%; height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        background: white;
        color: #1877f2;
    }
    .story-label { font-size: 0.75rem; color: #65676b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .categories-section {
        padding: 12px 16px;
        background: white;
        margin: 8px 0;
    }
    .chips-scroll {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .chips-scroll::-webkit-scrollbar { display: none; }
    .chip {
        background: #f0f2f5;
        color: #1c1e21;
        padding: 8px 18px;
        border-radius: 40px;
        font-size: 0.85rem;
        white-space: nowrap;
        border: 1px solid #e4e6eb;
        font-weight: 500;
    }
    .chip.active {
        background: #1877f2;
        color: white;
        font-weight: 600;
        border: none;
    }
    /* ===== FEED ===== */
    .feed-container { max-width: 600px; margin: 0 auto; padding: 8px 0 20px 0; }
    .feed-card {
        background: white;
        border-radius: 16px;
        margin: 0 12px 16px 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border: 1px solid #e4e6eb;
    }
    .card-header {
        display: flex;
        align-items: center;
        padding: 14px;
        gap: 12px;
    }
    .channel-icon {
        width: 44px; height: 44px;
        border-radius: 12px;
        background: #f0f2f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        color: #1877f2;
        border: 1px solid #e4e6eb;
    }
    .channel-info { flex: 1; }
    .channel-name { font-weight: 600; font-size: 1rem; color: #1c1e21; }
    .post-time { font-size: 0.7rem; color: #65676b; margin-top: 2px; }
    .card-header i { color: #65676b; font-size: 1.2rem; }
    .card-title { padding: 0 14px 10px 14px; font-size: 1.1rem; font-weight: 600; color: #1c1e21; }
    .card-description { padding: 0 14px 14px 14px; color: #65676b; font-size: 0.9rem; line-height: 1.5; }
    .video-container {
        position: relative;
        width: 100%;
        background: #000;
        aspect-ratio: 9/16;
        max-height: 500px;
    }
    .video-container iframe { width: 100%; height: 100%; border: none; }
    .image-placeholder {
        width: 100%; height: 200px;
        background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #1877f2;
        font-size: 3rem;
        border-top: 1px solid #e4e6eb;
        border-bottom: 1px solid #e4e6eb;
    }
    .card-footer {
        padding: 14px;
        display: flex;
        gap: 24px;
        border-top: 1px solid #e4e6eb;
    }
    .footer-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #65676b;
        font-size: 0.9rem;
        cursor: pointer;
    }
    .footer-item i.fa-heart { color: #f23b5c; }
    .footer-item i.fa-comment { color: #1877f2; }
    .footer-item i.fa-share { color: #42b72a; }
    /* ===== SHARE POPUP ===== */
    .share-popup {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: white;
        border-radius: 24px 24px 0 0;
        padding: 20px;
        z-index: 10001;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    }
    .share-popup.visible { transform: translateY(0); }
    .share-popup-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
    .share-popup-header h3 { font-size: 1.2rem; color: #1c1e21; }
    .close-share {
        background: none;
        border: none;
        font-size: 1.5rem;
        color: #65676b;
        cursor: pointer;
    }
    .share-options {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        text-align: center;
    }
    .share-option {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
    }
    .share-icon {
        width: 60px; height: 60px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
    }
    .share-icon.whatsapp { background: #25D366; color: white; }
    .share-icon.instagram { background: linear-gradient(45deg, #f09433, #d62976, #962fbf); color: white; }
    .share-icon.facebook { background: #1877f2; color: white; }
    .share-icon.copy { background: #f0f2f5; color: #1c1e21; }
    .share-option span { font-size: 0.8rem; color: #65676b; }
    .share-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 10000;
        display: none;
    }
    .share-overlay.visible { display: block; }
    /* ===== VIDEO OVERLAYS ===== */
    .video-info-overlay {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 30px 14px 14px;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        color: white;
        pointer-events: none;
    }
    .video-title-small { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; color: white; }
    .video-meta { font-size: 0.7rem; color: #ccc; display: flex; gap: 12px; }
    .loading-indicator {
        text-align: center;
        padding: 30px;
        color: #1877f2;
    }
    .loading-indicator i { font-size: 2rem; animation: spin 1s linear infinite; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .youtube-player-container {
        position: fixed;
        top: 60px; left: 0; right: 0;
        z-index: 1000;
        background: white;
        display: none;
        padding: 0;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }
    .youtube-player-container.active { display: block; }
    .player-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 16/9;
        max-width: 800px;
        margin: 0 auto;
    }
    .player-wrapper iframe { width: 100%; height: 100%; border: none; }
    .close-player {
        position: absolute;
        top: -40px; right: 10px;
        background: #1877f2;
        color: white;
        border: none;
        width: 40px; height: 40px;
        border-radius: 50%;
        font-size: 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        z-index: 1001;
    }
</style>

<script>
    // === DOM Elements ===
    const feedContainer = document.getElementById('feedContainer');
    const liveStories = document.getElementById('liveStories');
    const loadingEl = document.getElementById('loading');
    const sharePopup = document.getElementById('sharePopup');
    const shareOverlay = document.getElementById('shareOverlay');
    const closeShare = document.getElementById('closeShare');
    const youtubePlayerContainer = document.getElementById('youtubePlayerContainer');
    const youtubePlayer = document.getElementById('youtubePlayer');
    const closePlayerBtn = document.getElementById('closePlayerBtn');

    // === App State ===
    let userInteracted = false;
    let videoPlayerManager = null;
    let currentShareVideoId = null;
    let videoContainers = [];
    let currentVisibleIndex = 0;
    let previousVisibleIndex = -1;
    const BUFFER_PREV = 2;
    const BUFFER_NEXT = 6;

    // ========== FALLBACK DEMO VIDEOS (will be used if videos.json fails) ==========
    const FALLBACK_VIDEOS = [
        { videoId: "dDv06j8Orok", channelName: "Goa Shorts", channelIcon: "📺" },
        { videoId: "c7svj3bef50", channelName: "Goa Shorts", channelIcon: "📺" },
        { videoId: "olF6FdcJmi8", channelName: "Goa Shorts", channelIcon: "📺" },
        { videoId: "D8sdGeF0d1c", channelName: "Goa Shorts", channelIcon: "📺" },
        { videoId: "YP-FCgPPFZw", channelName: "Goa Shorts", channelIcon: "📺" }
    ];

    // === Helper Functions ===
    function getVisibleIndex() {
        for (let i = 0; i < videoContainers.length; i++) {
            const rect = videoContainers[i].getBoundingClientRect();
            if (rect.top < window.innerHeight && rect.bottom > 0) return i;
        }
        return 0;
    }

    function pauseVideo(container) {
        const iframe = container?.querySelector('iframe');
        if (iframe?.contentWindow) {
            iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
        }
    }

    function unmuteVideo(container) {
        const iframe = container?.querySelector('iframe');
        if (iframe?.contentWindow) {
            iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        }
    }

    function playVideo(container) {
        const iframe = container?.querySelector('iframe');
        if (iframe?.contentWindow) {
            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
        }
    }

    function loadVideo(container, videoId) {
        const iframe = container.querySelector('iframe');
        if (!iframe) return;
        if (!iframe.src) {
            iframe.src = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${videoId}&modestbranding=1&rel=0&iv_load_policy=3&vq=small`;
        }
    }

    function updateBufferWindow(visibleIdx) {
        if (!videoContainers.length) return;
        const start = Math.max(0, visibleIdx - BUFFER_PREV);
        const end = Math.min(videoContainers.length - 1, visibleIdx + BUFFER_NEXT);
        for (let i = start; i <= end; i++) {
            const container = videoContainers[i];
            if (container?.dataset.videoId) loadVideo(container, container.dataset.videoId);
        }
        for (let i = 0; i < start; i++) pauseVideo(videoContainers[i]);
        for (let i = end + 1; i < videoContainers.length; i++) pauseVideo(videoContainers[i]);
    }

    // === Share functions ===
    function showSharePopup(videoId) {
        currentShareVideoId = videoId;
        shareOverlay.classList.add('visible');
        sharePopup.classList.add('visible');
    }
    function hideSharePopup() {
        shareOverlay.classList.remove('visible');
        sharePopup.classList.remove('visible');
        currentShareVideoId = null;
    }
    document.querySelectorAll('.share-option').forEach(option => {
        option.addEventListener('click', (e) => {
            if (!currentShareVideoId) return;
            const shareUrl = `${window.location.origin}${window.location.pathname}?v=${currentShareVideoId}`;
            const type = option.dataset.share;
            if (type === 'whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(shareUrl)}`, '_blank');
            else if (type === 'instagram') { navigator.clipboard.writeText(shareUrl); alert('Link copied!'); }
            else if (type === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank');
            else if (type === 'copy') { navigator.clipboard.writeText(shareUrl); alert('Link copied!'); }
            hideSharePopup();
        });
    });
    closeShare.addEventListener('click', hideSharePopup);
    shareOverlay.addEventListener('click', hideSharePopup);

    // === Handle shared video links ===
    function loadVideoFromUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('v');
        if (videoId) {
            youtubePlayerContainer.classList.add('active');
            youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
        }
    }
    closePlayerBtn.addEventListener('click', () => {
        youtubePlayerContainer.classList.remove('active');
        youtubePlayer.src = '';
    });
    loadVideoFromUrl();

    // === Build feed from video data ===
    function buildFeed(videoData) {
        feedContainer.innerHTML = '';
        videoContainers = [];

        if (!videoData || videoData.length === 0) {
            feedContainer.innerHTML = '<div style="text-align:center; padding:50px; color:#666;">No shorts available.</div>';
            loadingEl.style.display = 'none';
            return;
        }

        videoData.forEach(item => {
            const card = document.createElement('div');
            card.className = 'feed-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="channel-icon">${item.channelIcon || '📺'}</div>
                    <div class="channel-info"><div class="channel-name">${item.channelName || 'Goa Shorts'}</div><div class="post-time">Shorts</div></div>
                    <i class="fas fa-ellipsis-h"></i>
                </div>
                <div class="video-container" data-video-id="${item.videoId}">
                    <iframe allow="autoplay; fullscreen"></iframe>
                    <div class="video-info-overlay"><div class="video-title-small">Goa Short</div><div class="video-meta"><span>#Shorts</span></div></div>
                </div>
                <div class="card-footer">
                    <span class="footer-item like-btn"><i class="fas fa-heart"></i> 1.2k</span>
                    <span class="footer-item comment-btn"><i class="fas fa-comment"></i> 89</span>
                    <span class="footer-item share-btn" data-video-id="${item.videoId}"><i class="fas fa-share"></i> Share</span>
                </div>
            `;

            const shareBtn = card.querySelector('.share-btn');
            shareBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showSharePopup(item.videoId);
            });

            const videoContainer = card.querySelector('.video-container');
            if (videoContainer) videoContainers.push(videoContainer);
            feedContainer.appendChild(card);
        });

        loadingEl.style.display = 'none';

        // Preload first 8 videos
        if (videoContainers.length > 0) {
            for (let i = 0; i < Math.min(8, videoContainers.length); i++) {
                const container = videoContainers[i];
                if (container?.dataset.videoId) loadVideo(container, container.dataset.videoId);
            }
        }

        setupVideoObserver();
        setTimeout(() => {
            const visibleIdx = getVisibleIndex();
            currentVisibleIndex = visibleIdx;
            previousVisibleIndex = visibleIdx;
            updateBufferWindow(visibleIdx);
        }, 500);
    }

    // === Load feed from JSON with fallback ===
    async function loadFeed() {
        loadingEl.style.display = 'block';
        feedContainer.innerHTML = '';
        feedContainer.appendChild(loadingEl);

        // Try to fetch videos.json from multiple locations
        let videoData = null;
        const possiblePaths = [
            '../videos.json',
            'videos.json',
            '/SOCIAL.COM/videos.json',
            './videos.json'
        ];

        for (const path of possiblePaths) {
            try {
                const response = await fetch(path);
                if (response.ok) {
                    videoData = await response.json();
                    console.log(`✅ Loaded videos from ${path}`);
                    break;
                }
            } catch (e) {
                // ignore, try next path
            }
        }

        if (videoData && videoData.length > 0) {
            buildFeed(videoData);
        } else {
            console.warn('⚠️ No videos.json found, using fallback demo videos.');
            // Use fallback demo videos
            buildFeed(FALLBACK_VIDEOS);
        }
    }

    function setupVideoObserver() {
        class VideoPlayerManager {
            constructor() {
                this.observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const container = entry.target;
                        const idx = videoContainers.indexOf(container);
                        if (entry.isIntersecting && idx !== -1) {
                            if (idx !== previousVisibleIndex) {
                                if (previousVisibleIndex !== -1) pauseVideo(videoContainers[previousVisibleIndex]);
                                playVideo(container);
                                if (userInteracted) unmuteVideo(container);
                                updateBufferWindow(idx);
                                previousVisibleIndex = idx;
                                currentVisibleIndex = idx;
                            }
                        }
                    });
                }, { threshold: 0.7, rootMargin: "100px 0px" });
            }
            observe(el) { this.observer.observe(el); }
        }
        videoPlayerManager = new VideoPlayerManager();
        videoContainers.forEach(c => videoPlayerManager.observe(c));
    }

    function loadLiveStories() {
        const lives = [
            { name: 'Goa Shorts', icon: '📱' },
            { name: 'Beach Life', icon: '🌊' },
            { name: 'Foodie', icon: '🍛' },
            { name: 'Travel', icon: '✈️' }
        ];
        liveStories.innerHTML = '';
        lives.forEach(live => {
            const story = document.createElement('div');
            story.className = 'story-item';
            story.innerHTML = `<div class="story-avatar live"><div class="story-avatar-inner">${live.icon}</div></div><div class="story-label">${live.name}</div>`;
            liveStories.appendChild(story);
        });
    }

    // === Initialize ===
    loadLiveStories();
    loadFeed();

    // Tap anywhere to unmute
    document.addEventListener('click', function firstTap() {
        if (!userInteracted) {
            userInteracted = true;
            if (videoContainers[currentVisibleIndex]) {
                unmuteVideo(videoContainers[currentVisibleIndex]);
            }
        }
    }, { once: true });
</script>
