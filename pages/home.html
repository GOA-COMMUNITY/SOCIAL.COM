<!-- Simple Feed with Hardcoded Videos -->
<div class="feed-container" id="feedContainer"></div>

<style>
    /* Feed card styles – copy from your existing CSS */
    .feed-container { max-width: 600px; margin: 0 auto; padding: 8px 0; }
    .feed-card {
        background: white;
        border-radius: 16px;
        margin: 0 12px 16px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        border: 1px solid #e4e6eb;
    }
    .card-header {
        display: flex;
        align-items: center;
        padding: 14px;
        gap: 12px;
    }
    .channel-icon {
        width: 44px; height: 44px;
        border-radius: 12px;
        background: #f0f2f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        color: #1877f2;
    }
    .channel-info { flex: 1; }
    .channel-name { font-weight: 600; }
    .post-time { font-size: 0.7rem; color: #65676b; }
    .video-container {
        position: relative;
        width: 100%;
        aspect-ratio: 9/16;
        background: #000;
    }
    .video-container iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    .card-footer {
        padding: 14px;
        display: flex;
        gap: 24px;
        border-top: 1px solid #e4e6eb;
    }
    .footer-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #65676b;
        cursor: pointer;
    }
    .footer-item i.fa-heart { color: #f23b5c; }
    .footer-item i.fa-comment { color: #1877f2; }
    .footer-item i.fa-share { color: #42b72a; }
    /* Video overlay (optional) */
    .video-info-overlay {
        position: absolute;
        bottom: 0; left: 0; right: 0;
        padding: 30px 14px 14px;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        color: white;
        pointer-events: none;
    }
    .video-title-small { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
    .video-meta { font-size: 0.7rem; color: #ccc; display: flex; gap: 12px; }
</style>

<script>
    // Hardcoded video IDs – replace with your own
    const videos = [
        "c7svj3bef50",
        "olF6FdcJmi8",
        "D8sdGeF0d1c",
        "YP-FCgPPFZw",
        "WzcrCtIYKwA",
        "jGcjc6L6JGg",
        "MNgxztaeJdw",
        "NXXOjOfJzHg",
        "N-s8BR8_CYM",
        "-va8Iz9OPdA",
        "aQ-PeqSkUZ0",
        "89JRkYXAi6Q"
    ];

    const feedContainer = document.getElementById('feedContainer');
    let videoContainers = [];

    function createVideoCard(videoId) {
        const card = document.createElement('div');
        card.className = 'feed-card';
        card.innerHTML = `
            <div class="card-header">
                <div class="channel-icon">📺</div>
                <div class="channel-info"><div class="channel-name">Goa Shorts</div><div class="post-time">Shorts</div></div>
                <i class="fas fa-ellipsis-h"></i>
            </div>
            <div class="video-container" data-video-id="${videoId}">
                <iframe src="https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=0&mute=1&controls=0&playsinline=1&loop=1&playlist=${videoId}&modestbranding=1&rel=0&iv_load_policy=3&vq=small"
                    allow="autoplay; fullscreen"></iframe>
                <div class="video-info-overlay"><div class="video-title-small">Goa Short</div><div class="video-meta"><span>#Shorts</span></div></div>
            </div>
            <div class="card-footer">
                <span class="footer-item"><i class="fas fa-heart"></i> 1.2k</span>
                <span class="footer-item"><i class="fas fa-comment"></i> 89</span>
                <span class="footer-item share-btn"><i class="fas fa-share"></i> Share</span>
            </div>
        `;
        // Add share functionality (simple alert for now)
        card.querySelector('.share-btn').addEventListener('click', () => {
            alert('Share this video: ' + videoId);
        });
        return card;
    }

    // Build feed
    videos.forEach(id => {
        const card = createVideoCard(id);
        feedContainer.appendChild(card);
        videoContainers.push(card.querySelector('.video-container'));
    });

    // Simple intersection observer to pause non-visible videos
    let observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            const iframe = entry.target.querySelector('iframe');
            if (!iframe) return;
            if (entry.isIntersecting) {
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            } else {
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            }
        });
    }, { threshold: 0.6 });

    videoContainers.forEach(container => observer.observe(container));

    // Optional: tap to unmute (simple)
    document.addEventListener('click', function unmuteOnce() {
        const visible = videoContainers.find(container => {
            const rect = container.getBoundingClientRect();
            return rect.top < window.innerHeight && rect.bottom > 0;
        });
        if (visible) {
            const iframe = visible.querySelector('iframe');
            if (iframe) iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
        }
        document.removeEventListener('click', unmuteOnce);
    }, { once: true });
</script>
