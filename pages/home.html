<div class="content-pane">

<h2 style="margin-bottom:20px;">Goa Video Feed</h2>

<div id="videoFeed"></div>

</div>

<script>

setTimeout(function(){

const videos = [
"dQw4w9WgXcQ",
"aqz-KE-bpKQ",
"ScMzIvxBSi4"
]

let container = document.getElementById("videoFeed")

videos.forEach(function(id){

container.innerHTML += `
<div style="margin-bottom:20px">

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg"
style="width:100%;cursor:pointer"
onclick="playVideo('${id}',this)">

</div>
`

})

},100)


function playVideo(id, element){

element.outerHTML = `
<iframe
width="100%"
height="220"
src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>
`

}

</script>
