<div style="padding: 20px; font-size: 24px; text-align: center;">
    🔍 If you can see this, home.html is loading!
</div>

<script>
    // Try to fetch with absolute URL
    fetch('https://goa-community.github.io/SOCIAL.COM/videos.json')
        .then(response => {
            document.body.innerHTML += `<div style="padding:20px; background:green; color:white;">✅ Fetch worked! Status: ${response.status}</div>`;
        })
        .catch(error => {
            document.body.innerHTML += `<div style="padding:20px; background:red; color:white;">❌ Fetch failed: ${error.message}</div>`;
        });
        
    // Also show that JavaScript is running
    document.body.innerHTML += `<div style="padding:20px;">⏱️ JavaScript is running...</div>`;
</script>
