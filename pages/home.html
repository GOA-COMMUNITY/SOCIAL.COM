        /* === YOUR EXACT CSS - UNCHANGED === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            color: #1c1e21;
            line-height: 1.4;
            padding-bottom: 70px;
            min-height: 100vh;
            position: relative;
        }

        .coconut-left {
            position: fixed;
            bottom: 80px;
            left: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(-10deg);
            z-index: 0;
            pointer-events: none;
            animation: swayLeft 6s ease-in-out infinite;
        }

        .coconut-right {
            position: fixed;
            bottom: 80px;
            right: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(10deg) scaleX(-1);
            z-index: 0;
            pointer-events: none;
            animation: swayRight 6s ease-in-out infinite;
        }

        @keyframes swayLeft {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(-5deg); }
        }

        @keyframes swayRight {
            0%, 100% { transform: rotate(10deg) scaleX(-1); }
            50% { transform: rotate(5deg) scaleX(-1); }
        }

        /* ===== SPLASH SCREEN ===== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #1877f2, #0a5cff);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .splash-overlay.tappable {
            pointer-events: auto;
        }

        .splash-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage1 {
            animation: logoZoom 2s forwards;
        }

        @keyframes logoZoom {
            0% { transform: scale(0.5); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            60% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .splash-logo {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 4px solid white;
        }

            height: 100%;
