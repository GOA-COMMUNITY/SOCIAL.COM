<!-- Simple Welcome Page - Loads INSTANTLY -->
<div style="padding: 20px; max-width: 600px; margin: 0 auto;">
    
    <!-- Welcome Card -->
    <div style="background: linear-gradient(145deg, #1877f2, #0a5cff); border-radius: 30px; padding: 40px 20px; margin-bottom: 20px; text-align: center; color: white;">
        <div style="width: 100px; height: 100px; border-radius: 25px; overflow: hidden; margin: 0 auto 20px; border: 3px solid white;">
            <img src="https://i.imgur.com/u5kGI2s.jpeg" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <h1 style="font-size: 2rem; margin-bottom: 10px;">Goa Social</h1>
        <p style="font-size: 1.1rem; opacity: 0.9;">Welcome to Goa's own community</p>
    </div>

    <!-- Quick Links -->
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 20px;">
        <div style="background: white; border-radius: 24px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <i class="fas fa-compass" style="font-size: 2rem; color: #1877f2; margin-bottom: 10px;"></i>
            <h3 style="font-size: 1.1rem;">Explore</h3>
            <p style="font-size: 0.8rem; color: #65676b;">Find Goans</p>
        </div>
        <div style="background: white; border-radius: 24px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <i class="fas fa-store" style="font-size: 2rem; color: #42b72a; margin-bottom: 10px;"></i>
            <h3 style="font-size: 1.1rem;">Business</h3>
            <p style="font-size: 0.8rem; color: #65676b;">Local shops</p>
        </div>
        <div style="background: white; border-radius: 24px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <i class="fas fa-comment-dots" style="font-size: 2rem; color: #1877f2; margin-bottom: 10px;"></i>
            <h3 style="font-size: 1.1rem;">Chats</h3>
            <p style="font-size: 0.8rem; color: #65676b;">Connect</p>
        </div>
        <div style="background: white; border-radius: 24px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <i class="fas fa-user" style="font-size: 2rem; color: #f23b5c; margin-bottom: 10px;"></i>
            <h3 style="font-size: 1.1rem;">Profile</h3>
            <p style="font-size: 0.8rem; color: #65676b;">Your account</p>
        </div>
    </div>

    <!-- Status Message -->
    <div style="background: #fff3cd; border: 1px solid #ffeeba; border-radius: 24px; padding: 20px; text-align: center; color: #856404;">
        <i class="fas fa-info-circle" style="font-size: 1.5rem; margin-bottom: 10px;"></i>
        <p style="font-weight: 600;">Videos are being configured</p>
        <p style="font-size: 0.9rem; margin-top: 8px;">The video feed will be available soon. For now, explore other sections!</p>
    </div>

    <!-- Bottom Padding -->
    <div style="height: 30px;"></div>
</div>

<style>
    body {
        background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        margin: 0;
        padding: 0;
    }
</style>

<script>
    // Force hide any existing splash screens
    const splashes = document.querySelectorAll('.splash-overlay');
    splashes.forEach(s => {
        if (s) s.style.display = 'none';
    });
    
    // Mark as loaded
    console.log('Home page loaded successfully');
</script>
