<div style="padding: 20px; font-family: sans-serif;">
    <h2>🔍 Testing videos.json</h2>
    <div id="result">Waiting for response...</div>
</div>

<script>
    async function testFetch() {
        const resultDiv = document.getElementById('result');
        const timeout = 5000; // 5 seconds
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);

        try {
            // Use absolute URL based on current location
            const base = window.location.origin + '/SOCIAL.COM/';
            const url = base + 'videos.json';
            resultDiv.innerHTML = `Trying: ${url}`;
            
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(id);
            
            if (response.ok) {
                const data = await response.json();
                resultDiv.innerHTML = `✅ Success! Found ${data.length} videos.<br>First video ID: ${data[0]?.videoId}`;
            } else {
                resultDiv.innerHTML = `❌ HTTP error: ${response.status} ${response.statusText}`;
            }
        } catch (error) {
            clearTimeout(id);
            if (error.name === 'AbortError') {
                resultDiv.innerHTML = '❌ Request timed out after 5 seconds. Check network or file existence.';
            } else {
                resultDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }
    }
    testFetch();
</script>
