<div style="padding: 20px; font-family: sans-serif;">
    <h2>Testing videos.json</h2>
    <div id="result">Loading...</div>
</div>

<script>
    async function testFetch() {
        const resultDiv = document.getElementById('result');
        try {
            // Try multiple paths
            let response;
            const paths = [
                '../videos.json',
                'videos.json',
                '/SOCIAL.COM/videos.json',
                './videos.json'
            ];
            for (let path of paths) {
                try {
                    response = await fetch(path);
                    if (response.ok) {
                        resultDiv.innerHTML = `✅ Found videos.json at ${path}`;
                        const data = await response.json();
                        resultDiv.innerHTML += `<br>📁 Contains ${data.length} videos. First video ID: ${data[0]?.videoId}`;
                        return;
                    }
                } catch (e) {}
            }
            resultDiv.innerHTML = '❌ Could not find videos.json in any location. Check the path.';
        } catch (e) {
            resultDiv.innerHTML = '❌ Error: ' + e.message;
        }
    }
    testFetch();
</script>
