<div class="content-pane">

<h2 style="margin-bottom:20px;">Goa Videos</h2>

<div id="videoFeed"></div>

</div>

<script>

/* YOUR CHANNEL RSS */

const channels = [

"https://www.youtube.com/feeds/videos.xml?channel_id=UCYPvAwZP8pZhSMW8qs7cVCw",
"https://www.youtube.com/feeds/videos.xml?channel_id=UC9CYT9gSNLevX5ey2_6CK0Q"

]

async function loadVideos(){

let container = document.getElementById("videoFeed")

channels.forEach(async channel=>{

let api = "https://api.rss2json.com/v1/api.json?rss_url="+channel

let res = await fetch(api)

let data = await res.json()

/* choose non-live video */

let video = data.items.find(v => !v.title.includes("LIVE"))

if(!video) return

let id = video.link.split("v=")[1]

container.innerHTML += `

<div class="card" style="padding:0;overflow:hidden">

<div style="position:relative;cursor:pointer"
onclick="playVideo('${id}', this)">

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg"
style="width:100%">

<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
background:rgba(0,0,0,0.6);
padding:12px 20px;
border-radius:50%;
">
▶
</div>

</div>

<div style="padding:16px">
<h3 style="font-size:1rem">${video.title}</h3>
</div>

</div>

`

})

}

function playVideo(id, element){

element.outerHTML = `
<iframe
width="100%"
height="220"
src="https://www.youtube-nocookie.com/embed/${id}"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
`

}

loadVideos()

</script>
