<div class="content-pane">

<h2 style="margin-bottom:20px;">Goa Video Feed</h2>

<div id="videoFeed"></div>

</div>

<script>

/* YOUTUBE CHANNEL RSS FEEDS */

const channels = [

/* NDTV India */
"https://www.youtube.com/feeds/videos.xml?channel_id=UCZFMm1mMw0F81Z37aaEzTUA",

/* India Today */
"https://www.youtube.com/feeds/videos.xml?channel_id=UCYPvAwZP8pZhSMW8qs7cVCw",

/* RDX Goa */
"https://www.youtube.com/feeds/videos.xml?channel_id=UC0YH6QJk8C5o0T6g8Y6l6kQ",

/* Goa365 TV */
"https://www.youtube.com/feeds/videos.xml?channel_id=UC9CYT9gSNLevX5ey2_6CK0Q",

/* Goa News Hub */
"https://www.youtube.com/feeds/videos.xml?channel_id=UCiQnJkCz0r4iCq9Q3rQ0T6g",

/* Travel With Sonia */
"https://www.youtube.com/feeds/videos.xml?channel_id=UCn5fW8G9Rz0P3X6mX6v8WkQ"

]

async function loadVideos(){

let container = document.getElementById("videoFeed")

channels.forEach(async channel=>{

let api = "https://api.rss2json.com/v1/api.json?rss_url="+channel

let res = await fetch(api)

let data = await res.json()

/* show 3 videos from each channel */

data.items.slice(0,3).forEach(video=>{

let id = video.link.split("v=")[1].split("&")[0]

container.innerHTML += `

<div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">

<div style="position:relative;cursor:pointer"
onclick="playVideo('${id}', this)">

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg"
style="width:100%">

<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
background:rgba(0,0,0,0.6);
padding:12px 18px;
border-radius:50%;
">
▶
</div>

</div>

<div style="padding:16px">

<h3 style="font-size:1rem;margin-bottom:6px">
${video.title}
</h3>

<p style="font-size:0.75rem;color:#888">
${new Date(video.pubDate).toLocaleDateString()}
</p>

</div>

</div>

`

})

})

}

/* PLAY VIDEO */

function playVideo(id, element){

element.outerHTML = `
<iframe
width="100%"
height="220"
src="https://www.youtube-nocookie.com/embed/${id}?rel=0&autoplay=1"
frameborder="0"
allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
`

}

loadVideos()

</script>
