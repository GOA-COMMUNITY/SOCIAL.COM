<div class="content-pane">

<h2 style="margin-bottom:20px;">Goa Social Feed</h2>

<!-- LIVE VIDEOS -->
<div class="card">
<h3>🔴 Live Now</h3>
<div id="liveFeed">Checking live streams...</div>
</div>

<!-- VIDEO FEED -->
<div class="card">
<h3>🎥 Latest Videos</h3>
<div id="videoFeed"></div>
</div>

<!-- NEWS FEED -->
<div class="card">
<h3>📰 Goa News</h3>
<div id="newsFeed">Loading news...</div>
</div>

</div>

<script>

/* =========================
   YOUTUBE CHANNEL RSS
========================= */

const channels = [

"https://www.youtube.com/feeds/videos.xml?channel_id=UCs6n1V7sW1sK4Ck6uE4Fv9Q", // NDTV India
"https://www.youtube.com/feeds/videos.xml?channel_id=UCYPvAwZP8pZhSMW8qs7cVCw", // India Today
"https://www.youtube.com/feeds/videos.xml?channel_id=UC9CYT9gSNLevX5ey2_6CK0Q", // Goa365
"https://www.youtube.com/feeds/videos.xml?channel_id=UCiQnJkCz0r4iCq9Q3rQ0T6g"  // Goa News Hub

]

/* =========================
   GOA NEWS RSS
========================= */

const newsFeeds = [

"https://timesofindia.indiatimes.com/rssfeeds/3012535.cms",
"https://www.heraldgoa.in/rss"

]

/* =========================
   LOAD VIDEOS
========================= */

async function loadVideos(){

let container = document.getElementById("videoFeed")

channels.forEach(async channel=>{

let api = "https://api.rss2json.com/v1/api.json?rss_url="+channel

let res = await fetch(api)

let data = await res.json()

data.items.slice(0,3).forEach(video=>{

let id = video.link.split("v=")[1]

container.innerHTML += `

<div class="card" style="padding:0;overflow:hidden;margin-bottom:20px">

<div style="position:relative;cursor:pointer"
onclick="playVideo('${id}', this)">

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg"
style="width:100%">

<div style="
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
background:rgba(0,0,0,0.6);
padding:12px 18px;
border-radius:50%;
">
▶
</div>

</div>

<div style="padding:16px">

<h3 style="font-size:1rem;margin-bottom:6px">
${video.title}
</h3>

<p style="font-size:0.75rem;color:#888">
${new Date(video.pubDate).toLocaleDateString()}
</p>

</div>

</div>

`

})

})

}

/* =========================
   PLAY VIDEO INLINE
========================= */

function playVideo(id, element){

element.outerHTML = `
<iframe
width="100%"
height="220"
src="https://www.youtube-nocookie.com/embed/${id}?rel=0&autoplay=1"
frameborder="0"
allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>
`

}

/* =========================
   LOAD NEWS
========================= */

async function loadNews(){

let container = document.getElementById("newsFeed")

container.innerHTML = ""

newsFeeds.forEach(async feed=>{

let api = "https://api.rss2json.com/v1/api.json?rss_url="+feed

let res = await fetch(api)

let data = await res.json()

data.items.slice(0,3).forEach(article=>{

let img = ""

let match = article.description.match(/src="(.*?)"/)

if(match){
img = match[1]
}

container.innerHTML += `

<div class="card" style="padding:0;margin-bottom:20px">

${img ? `<img src="${img}" style="width:100%">` : ""}

<div style="padding:16px">

<h3 style="font-size:1rem;margin-bottom:8px">
${article.title}
</h3>

<p style="font-size:0.85rem;color:#aaa">
${article.description.replace(/<[^>]+>/g,'').substring(0,120)}...
</p>

<button
onclick="openArticle('${article.link}')"
style="
margin-top:10px;
background:#ff7b42;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
">
Read Article
</button>

</div>

</div>

`

})

})

}

/* =========================
   ARTICLE READER
========================= */

function openArticle(url){

window.open(url, "_blank")

}

/* =========================
   START
========================= */

loadVideos()
loadNews()

</script>
