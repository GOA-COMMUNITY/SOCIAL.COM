<div style="padding: 16px; max-width: 600px; margin: 0 auto;">
    <!-- Profile Header -->
    <div style="background: white; border-radius: 24px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
        <div style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(145deg, #1877f2, #0a5cff); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem;">
            <i class="fas fa-user"></i>
        </div>
        <h2 style="font-size: 1.5rem; margin-bottom: 4px;">Guest User</h2>
        <p style="color: #65676b; margin-bottom: 16px;">@goan_explorer</p>
        <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 20px;">
            <div style="text-align: center;">
                <div style="font-weight: 700; font-size: 1.2rem;">0</div>
                <div style="color: #65676b; font-size: 0.8rem;">Posts</div>
            </div>
            <div style="text-align: center;">
                <div style="font-weight: 700; font-size: 1.2rem;">0</div>
                <div style="color: #65676b; font-size: 0.8rem;">Followers</div>
            </div>
            <div style="text-align: center;">
                <div style="font-weight: 700; font-size: 1.2rem;">0</div>
                <div style="color: #65676b; font-size: 0.8rem;">Following</div>
            </div>
        </div>
        <button style="background: #1877f2; color: white; border: none; padding: 12px 30px; border-radius: 40px; font-weight: 600; cursor: pointer; width: 100%;">Edit Profile</button>
    </div>

    <!-- Menu Items -->
    <div style="background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <div style="display: flex; align-items: center; padding: 16px; gap: 12px; border-bottom: 1px solid #e4e6eb; cursor: pointer;">
            <i class="fas fa-bookmark" style="color: #1877f2; width: 24px;"></i>
            <span style="flex: 1;">Saved Videos</span>
            <i class="fas fa-chevron-right" style="color: #65676b;"></i>
        </div>
        <div style="display: flex; align-items: center; padding: 16px; gap: 12px; border-bottom: 1px solid #e4e6eb; cursor: pointer;">
            <i class="fas fa-clock" style="color: #1877f2; width: 24px;"></i>
            <span style="flex: 1;">Watch History</span>
            <i class="fas fa-chevron-right" style="color: #65676b;"></i>
        </div>
        <div style="display: flex; align-items: center; padding: 16px; gap: 12px; border-bottom: 1px solid #e4e6eb; cursor: pointer;">
            <i class="fas fa-cog" style="color: #1877f2; width: 24px;"></i>
            <span style="flex: 1;">Settings</span>
            <i class="fas fa-chevron-right" style="color: #65676b;"></i>
        </div>
        <div style="display: flex; align-items: center; padding: 16px; gap: 12px; cursor: pointer;">
            <i class="fas fa-question-circle" style="color: #1877f2; width: 24px;"></i>
            <span style="flex: 1;">Help & Support</span>
            <i class="fas fa-chevron-right" style="color: #65676b;"></i>
        </div>
    </div>

    <!-- Sign Out Button -->
    <div style="margin-top: 20px; text-align: center;">
        <button style="background: none; border: none; color: #f23b5c; font-weight: 600; cursor: pointer;">Sign Out</button>
    </div>
</div>
