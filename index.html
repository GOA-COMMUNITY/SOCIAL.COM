<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            color: #1c1e21;
            line-height: 1.4;
            padding-bottom: 70px;
            min-height: 100vh;
            position: relative;
        }
        /* Coconut trees */
        .coconut-left, .coconut-right {
            position: fixed;
            bottom: 80px;
            font-size: 4rem;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: sway 6s ease-in-out infinite;
        }
        .coconut-left { left: 10px; transform: rotate(-10deg); }
        .coconut-right { right: 10px; transform: rotate(10deg) scaleX(-1); }
        @keyframes sway {
            0%,100% { transform: rotate(-10deg); }
            50% { transform: rotate(-5deg); }
        }
        .coconut-right { animation-name: swayRight; }
        @keyframes swayRight {
            0%,100% { transform: rotate(10deg) scaleX(-1); }
            50% { transform: rotate(5deg) scaleX(-1); }
        }
        /* Header */
        .app-header {
            background: white;
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e6eb;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-crop {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            background: #1877f2;
            border: 1px solid #e4e6eb;
        }
        .logo-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1877f2;
        }
        .header-actions {
            display: flex;
            gap: 20px;
            color: #65676b;
        }
        .header-actions i { font-size: 1.3rem; }
        /* Content area */
        #content {
            min-height: calc(100vh - 140px);
        }
        /* Bottom navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e4e6eb;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 10px 12px 10px;
            z-index: 1000;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #65676b;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
        }
        .nav-item i { font-size: 1.5rem; margin-bottom: 2px; }
        .nav-item.active { color: #1877f2; }
        /* Simple loader */
        .loader {
            text-align: center;
            padding: 50px;
            color: #1877f2;
        }
        .loader i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="coconut-left">🌴</div>
    <div class="coconut-right">🌴</div>

    <header class="app-header">
        <div class="logo-container">
            <div class="logo-crop">
                <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
            </div>
            <span class="logo-text">Goa Social</span>
        </div>
        <div class="header-actions">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <div id="content">
        <div class="loader">
            <i class="fas fa-circle-notch"></i>
            <p>Loading...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item" onclick="loadPage('home')"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" onclick="loadPage('explore')"><i class="fas fa-compass"></i><span>Explore</span></button>
        <button class="nav-item" onclick="loadPage('business')"><i class="fas fa-store"></i><span>Business</span></button>
        <button class="nav-item" onclick="loadPage('chats')"><i class="fas fa-comment-dots"></i><span>Chats</span></button>
        <button class="nav-item" onclick="loadPage('profile')"><i class="fas fa-user"></i><span>Profile</span></button>
    </nav>

    <script>
        async function loadPage(pageName) {
            const contentDiv = document.getElementById('content');
            contentDiv.innerHTML = '<div class="loader"><i class="fas fa-circle-notch"></i><p>Loading ' + pageName + '...</p></div>';

            // Update active nav
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            const buttons = document.querySelectorAll('.nav-item');
            for (let btn of buttons) {
                if (btn.querySelector('span').innerText.toLowerCase() === pageName.toLowerCase()) {
                    btn.classList.add('active');
                    break;
                }
            }

            try {
                const response = await fetch(`pages/${pageName}.html`);
                if (!response.ok) throw new Error('Page not found');
                const html = await response.text();
                contentDiv.innerHTML = html;
            } catch (error) {
                contentDiv.innerHTML = `
                    <div style="text-align:center; padding:50px;">
                        <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#f23b5c;"></i>
                        <p style="margin-top:20px;">Could not load ${pageName}. Please try again.</p>
                        <button onclick="loadPage('home')" style="margin-top:20px; background:#1877f2; color:white; border:none; padding:10px 30px; border-radius:40px;">Go Home</button>
                    </div>
                `;
            }
        }

        window.addEventListener('load', () => {
            document.querySelectorAll('.nav-item')[0].classList.add('active');
            loadPage('home');
        });
    </script>
</body>
</html>
