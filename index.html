<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social · Only Shorts</title>
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1877f2">
    <link rel="apple-touch-icon" href="https://i.imgur.com/u5kGI2s.jpeg">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://i.ytimg.com">
    <link rel="preconnect" href="https://www.googlevideo.com">
    <style>
        /* === YOUR EXACT CSS - UNCHANGED === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            color: #1c1e21;
            line-height: 1.4;
            padding-bottom: 70px;
            min-height: 100vh;
            position: relative;
        }

        .coconut-left {
            position: fixed;
            bottom: 80px;
            left: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(-10deg);
            z-index: 0;
            pointer-events: none;
            animation: swayLeft 6s ease-in-out infinite;
        }

        .coconut-right {
            position: fixed;
            bottom: 80px;
            right: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(10deg) scaleX(-1);
            z-index: 0;
            pointer-events: none;
            animation: swayRight 6s ease-in-out infinite;
        }

        @keyframes swayLeft {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(-5deg); }
        }

        @keyframes swayRight {
            0%, 100% { transform: rotate(10deg) scaleX(-1); }
            50% { transform: rotate(5deg) scaleX(-1); }
        }

        /* ===== SPLASH SCREEN ===== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #1877f2, #0a5cff);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }

        .splash-overlay.tappable {
            pointer-events: auto;
        }

        .splash-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stage1 {
            animation: logoZoom 2s forwards;
        }

        @keyframes logoZoom {
            0% { transform: scale(0.5); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            60% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .splash-logo {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 4px solid white;
        }

        .splash-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stage2 {
            opacity: 0;
            animation: fadeIn 0.5s forwards 2s;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .loading-content {
            text-align: center;
            color: white;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-message {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .loading-sub {
            font-size: 1rem;
            opacity: 0.8;
        }

        .stage3 {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(5px);
            display: none;
        }

        .tap-content {
            text-align: center;
            animation: gentlePulse 2s infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .tap-logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            overflow: hidden;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(24,119,242,0.3);
            border: 3px solid #1877f2;
        }

        .tap-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tap-message {
            font-size: 1.5rem;
            color: #1877f2;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .tap-hint {
            color: #65676b;
            font-size: 1.1rem;
        }

        .tap-hint i {
            color: #1877f2;
            margin-right: 8px;
        }

        /* ===== YOUTUBE PLAYER ===== */
        .youtube-player-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 1000;
            background: white;
            display: none;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .youtube-player-container.active {
            display: block;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            max-width: 800px;
            margin: 0 auto;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -40px;
            right: 10px;
            background: #1877f2;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 1001;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: white;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e6eb;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-crop {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            background: #1877f2;
            flex-shrink: 0;
            border: 1px solid #e4e6eb;
        }

        .logo-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1877f2;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            color: #65676b;
        }

        .header-actions i {
            font-size: 1.3rem;
        }

        /* ===== STORIES ===== */
        .stories-section {
            padding: 16px 16px 12px 16px;
            background: white;
            margin: 8px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c1e21;
        }

        .section-header a {
            color: #1877f2;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            min-width: 90px;
            text-align: center;
        }

        .story-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e4e6eb, #d8dade);
            position: relative;
            overflow: hidden;
            margin: 0 auto 8px auto;
            border: 3px solid #1877f2;
        }

        .story-avatar.live::after {
            content: 'LIVE';
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: #ff0000;
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 600;
        }

        .story-avatar-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: white;
            color: #1877f2;
        }

        .story-label {
            font-size: 0.75rem;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            padding: 12px 16px;
            background: white;
            margin: 8px 0;
        }

        .chips-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chips-scroll::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: #f0f2f5;
            color: #1c1e21;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: 1px solid #e4e6eb;
            font-weight: 500;
        }

        .chip.active {
            background: #1877f2;
            color: white;
            font-weight: 600;
            border: none;
        }

        /* ===== FEED ===== */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 0 20px 0;
        }

        .feed-card {
            background: white;
            border-radius: 16px;
            margin: 0 12px 16px 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e4e6eb;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 14px;
            gap: 12px;
        }

        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #1877f2;
            border: 1px solid #e4e6eb;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            color: #1c1e21;
        }

        .post-time {
            font-size: 0.7rem;
            color: #65676b;
            margin-top: 2px;
        }

        .card-header i {
            color: #65676b;
            font-size: 1.2rem;
        }

        .card-title {
            padding: 0 14px 10px 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c1e21;
        }

        .card-description {
            padding: 0 14px 14px 14px;
            color: #65676b;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 9/16;
            max-height: 500px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1877f2;
            font-size: 3rem;
            border-top: 1px solid #e4e6eb;
            border-bottom: 1px solid #e4e6eb;
        }

        .card-footer {
            padding: 14px;
            display: flex;
            gap: 24px;
            border-top: 1px solid #e4e6eb;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #65676b;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .footer-item i.fa-heart { color: #f23b5c; }
        .footer-item i.fa-comment { color: #1877f2; }
        .footer-item i.fa-share { color: #42b72a; }

        .share-popup {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            z-index: 10001;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }

        .share-popup.visible {
            transform: translateY(0);
        }

        .share-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .share-popup-header h3 {
            font-size: 1.2rem;
            color: #1c1e21;
        }

        .close-share {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #65676b;
            cursor: pointer;
        }

        .share-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            text-align: center;
        }

        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .share-icon {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .share-icon.whatsapp { background: #25D366; color: white; }
        .share-icon.instagram { background: linear-gradient(45deg, #f09433, #d62976, #962fbf); color: white; }
        .share-icon.facebook { background: #1877f2; color: white; }
        .share-icon.copy { background: #f0f2f5; color: #1c1e21; }

        .share-option span {
            font-size: 0.8rem;
            color: #65676b;
        }

        .share-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: none;
        }

        .share-overlay.visible {
            display: block;
        }

        .event-details {
            padding: 0 14px 14px 14px;
            display: flex;
            gap: 20px;
            color: #1877f2;
            font-size: 0.9rem;
        }

        .event-details span i {
            margin-right: 6px;
            color: #65676b;
        }

        .video-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 14px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            pointer-events: none;
        }

        .video-title-small {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: white;
        }

        .video-meta {
            font-size: 0.7rem;
            color: #ccc;
            display: flex;
            gap: 12px;
        }

        .loading-indicator {
            text-align: center;
            padding: 30px;
            color: #1877f2;
        }

        .loading-indicator i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e4e6eb;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 10px 12px 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #65676b;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #1877f2;
        }
    </style>
</head>
<body>
    <div class="coconut-left">🌴</div>
    <div class="coconut-right">🌴</div>

    <!-- Splash Screen -->
    <div class="splash-overlay" id="splashOverlay">
        <div class="splash-stage stage1" id="stage1">
            <div class="splash-logo"><img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social"></div>

        <div class="splash-stage stage2" id="stage2">

                <div class="loading-spinner"></div>
                <div class="loading-message">Goa Social is loading...</div>
                <div class="loading-sub">Fetching only Shorts</div>

        <div class="splash-stage stage3" id="stage3">
            <div class="tap-content">
                <div class="tap-logo"><img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social"></div>
                <div class="tap-message">Welcome to Goa Social</div>
                <div class="tap-hint"><i class="fas fa-hand-pointer"></i> Tap anywhere to begin</div>
            </div>
        </div>
    </div>

    <!-- Share Popup -->
    <div class="share-overlay" id="shareOverlay"></div>
    <div class="share-popup" id="sharePopup">
        <div class="share-popup-header"><h3>Share to</h3><button class="close-share" id="closeShare">&times;</button></div>
        <div class="share-options">
            <div class="share-option" data-share="whatsapp"><div class="share-icon whatsapp"><i class="fab fa-whatsapp"></i></div><span>WhatsApp</span></div>

        </div>
    </div>

    <!-- YouTube Player Container (for shared videos) -->
    <div class="youtube-player-container" id="youtubePlayerContainer">
        <div class="player-wrapper"><button class="close-player" id="closePlayerBtn">&times;</button><iframe id="youtubePlayer" allow="autoplay; fullscreen"></iframe></div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="logo-container" id="logoContainer">
            <div class="logo-crop"><img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social"></div>
            <span class="logo-text">Goa Social</span>
        </div>
        <div class="header-actions"><i class="fas fa-search"></i><i class="fas fa-bell"></i></div>
    </header>

    <!-- Stories -->
    <div class="stories-section">
        <div class="section-header"><h3>LIVE NOW</h3><a href="#">View all <i class="fas fa-chevron-right"></i></a></div>
        <div class="stories-scroll" id="liveStories"></div>
    </div>

    <!-- Categories -->
    <div class="categories-section">

            <span class="chip active">All</span> <span class="chip">Trending</span> <span class="chip">Local</span>

            <span class="chip">Food</span> <span class="chip">Travel</span>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="window.location.href='index.html'"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" onclick="window.location.href='dating.html'"><i class="fas fa-heart"></i><span>Dating</span></button>
        <button class="nav-item" onclick="window.location.href='business.html'"><i class="fas fa-store"></i><span>Business</span></button>

    <script>
        // === DOM Elements ===
        const feedContainer = document.getElementById('feedContainer');
        const liveStories = document.getElementById('liveStories');
        const loadingEl = document.getElementById('loading');
        const splashOverlay = document.getElementById('splashOverlay');
        const stage1 = document.getElementById('stage1');
        const stage2 = document.getElementById('stage2');
        const stage3 = document.getElementById('stage3');
        const youtubePlayerContainer = document.getElementById('youtubePlayerContainer');
        const youtubePlayer = document.getElementById('youtubePlayer');
        const closePlayerBtn = document.getElementById('closePlayerBtn');
        const logoContainer = document.getElementById('logoContainer');
        const sharePopup = document.getElementById('sharePopup');
        const shareOverlay = document.getElementById('shareOverlay');
        const closeShare = document.getElementById('closeShare');

        // App state
        let userInteracted = false;
        let videoPlayerManager = null;
        let logoClickCount = 0;
        let currentShareVideoId = null;
        let feedReady = false;
        let videoContainers = [];
        let currentVisibleIndex = 0;
        let previousVisibleIndex = -1;
        let firstVideoConfirmedPlaying = false;
        let secondVideoReady = false;
        let timeoutDone = false;
        const BUFFER_PREV = 2;
        const BUFFER_NEXT = 6;

        function getVisibleIndex() {
            for (let i = 0; i < videoContainers.length; i++) {
                const rect = videoContainers[i].getBoundingClientRect();
                if (rect.top < window.innerHeight && rect.bottom > 0) return i;
            }
            return 0;
        }

        function pauseVideo(container) {
            const iframe = container?.querySelector('iframe');
            if (iframe?.contentWindow) {
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            }
        }

        function muteVideo(container) {
            const iframe = container?.querySelector('iframe');
            if (iframe?.contentWindow) {
                iframe.contentWindow.postMessage('{"event":"command","func":"mute","args":""}', '*');
            }
        }

        function unmuteVideo(container) {
            const iframe = container?.querySelector('iframe');
            if (iframe?.contentWindow) {
                iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
            }
        }

        function playVideo(container) {
            const iframe = container?.querySelector('iframe');
            if (iframe?.contentWindow) {
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
            }
        }

        function loadVideo(container, videoId, isFirst = false) {
            const iframe = container.querySelector('iframe');
            if (!iframe) return;
            if (!iframe.src) {
                iframe.src = `https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${videoId}&modestbranding=1&rel=0&iv_load_policy=3&vq=small`;

                iframe.addEventListener('error', function onError() {
                    console.warn('Video failed to load, removing:', videoId);
                    const card = container.closest('.feed-card');
                    if (card && card.parentNode) {
                        const idx = videoContainers.indexOf(container);
                        if (idx !== -1) videoContainers.splice(idx, 1);
                        card.remove();
                    }
                    iframe.removeEventListener('error', onError);
                });

                iframe.addEventListener('load', function onLoad() {
                    if (isFirst) {
                        playVideo(container);
                        setTimeout(() => {
                            firstVideoConfirmedPlaying = true;
                            maybeShowTapScreen();
                        }, 500);
                    } else {
                        setTimeout(() => {
                            playVideo(container);
                            setTimeout(() => {
                                pauseVideo(container);
                            }, 150);
                        }, 200);
                    }
                    iframe.removeEventListener('load', onLoad);
                }, { once: true });
            }
        }

        function ensureFirstVideoPlays(container, maxAttempts = 15, interval = 200) {
            let attempts = 0;
            const timer = setInterval(() => {
                attempts++;
                playVideo(container);
                if (attempts >= maxAttempts) {
                    clearInterval(timer);
                }
            }, interval);
        }

        function updateBufferWindow(visibleIdx) {
            if (!videoContainers.length) return;
            const start = Math.max(0, visibleIdx - BUFFER_PREV);
            const end = Math.min(videoContainers.length - 1, visibleIdx + BUFFER_NEXT);

            for (let i = start; i <= end; i++) {
                const container = videoContainers[i];
                if (container?.dataset.videoId) {
                    loadVideo(container, container.dataset.videoId, false);
                }
            }

            for (let i = 0; i < start; i++) {
                pauseVideo(videoContainers[i]);
            }
            for (let i = end + 1; i < videoContainers.length; i++) {
                pauseVideo(videoContainers[i]);
            }
        }

        // Splash timing
        setTimeout(() => { stage1.style.display = 'none'; stage2.style.display = 'flex'; }, 2000);
        setTimeout(() => {
            timeoutDone = true;
            maybeShowTapScreen();
        }, 10000);

        function maybeShowTapScreen() {
            if (timeoutDone && firstVideoConfirmedPlaying && secondVideoReady) {
                stage2.style.display = 'none';
                stage3.style.display = 'flex';
                splashOverlay.classList.add('tappable');
            }
        }

        // Share functions
        function showSharePopup(videoId) { currentShareVideoId = videoId; shareOverlay.classList.add('visible'); sharePopup.classList.add('visible'); }
        function hideSharePopup() { shareOverlay.classList.remove('visible'); sharePopup.classList.remove('visible'); currentShareVideoId = null; }
        document.querySelectorAll('.share-option').forEach(option => {
            option.addEventListener('click', (e) => {
                if (!currentShareVideoId) return;
                const shareUrl = `${window.location.origin}${window.location.pathname}?v=${currentShareVideoId}`;
                const type = option.dataset.share;
                if (type === 'whatsapp') window.open(`https://wa.me/?text=${encodeURIComponent(shareUrl)}`, '_blank');
                else if (type === 'instagram') { navigator.clipboard.writeText(shareUrl); alert('Link copied!'); }
                else if (type === 'facebook') window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank');
                else if (type === 'copy') { navigator.clipboard.writeText(shareUrl); alert('Link copied!'); }
                hideSharePopup();
            });
        });
        closeShare.addEventListener('click', hideSharePopup);
        shareOverlay.addEventListener('click', hideSharePopup);

        // Developer mode
        logoContainer.addEventListener('click', () => {
            if (!userInteracted) return;
            logoClickCount++;
            if (logoClickCount === 7) {
                window.open('about:blank', '_blank').document.write('<h1>Dev Mode Active</h1>');
                logoClickCount = 0;
            }
        });

        function startApp() {
            if (userInteracted) return;
            userInteracted = true;
            splashOverlay.classList.add('hidden');
            if (videoContainers[currentVisibleIndex]) {
                unmuteVideo(videoContainers[currentVisibleIndex]);
            }
        }

        function loadVideoFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');
            if (videoId) { youtubePlayerContainer.classList.add('active'); youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`; }
        }
        closePlayerBtn.addEventListener('click', () => { youtubePlayerContainer.classList.remove('active'); youtubePlayer.src = ''; });
        loadVideoFromUrl();

        // ===== LOAD FEED FROM JSON (with empty array fallback) =====
        async function loadFeed() {
            loadingEl.style.display = 'block';
            feedContainer.innerHTML = '';
            feedContainer.appendChild(loadingEl);

            try {
                const response = await fetch('videos.json');
                if (!response.ok) throw new Error('Failed to load videos.json');
                const videoData = await response.json();

                feedContainer.innerHTML = '';

                if (!videoData || videoData.length === 0) {
                    // Show a friendly message if no videos
                    feedContainer.innerHTML = '<div style="text-align:center; padding:50px; color:#666;">No shorts available right now. Please check back later.</div>';
                    loadingEl.style.display = 'none';
                    return;
                }

                videoData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'feed-card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="channel-icon">📺</div>
                            <div class="channel-info"><div class="channel-name">Goa Shorts</div><div class="post-time">Shorts</div></div>
                            <i class="fas fa-ellipsis-h"></i>
                        </div>
                        <div class="video-container" data-video-id="${item.videoId}">
                            <iframe allow="autoplay; fullscreen"></iframe>
                            <div class="video-info-overlay"><div class="video-title-small">Goa Short</div><div class="video-meta"><span>#Shorts</span></div></div>
                        </div>
                        <div class="card-footer">
                            <span class="footer-item like-btn"><i class="fas fa-heart"></i> 1.2k</span>
                            <span class="footer-item comment-btn"><i class="fas fa-comment"></i> 89</span>
                            <span class="footer-item share-btn" data-video-id="${item.videoId}"><i class="fas fa-share"></i> Share</span>
                        </div>
                    `;

                    const shareBtn = card.querySelector('.share-btn');
                    shareBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showSharePopup(item.videoId);
                    });

                    const videoContainer = card.querySelector('.video-container');
                    if (videoContainer) videoContainers.push(videoContainer);

                    feedContainer.appendChild(card);
                });

                loadingEl.style.display = 'none';
                feedReady = true;

                if (videoContainers.length > 0) {
                    for (let i = 0; i < Math.min(8, videoContainers.length); i++) {
                        const container = videoContainers[i];
                        if (container?.dataset.videoId) {
                            loadVideo(container, container.dataset.videoId, i === 0);
                        }
                    }

                    const firstContainer = videoContainers[0];
                    setTimeout(() => {
                        ensureFirstVideoPlays(firstContainer, 15, 200);
                    }, 1000);

                    const checkSecondInterval = setInterval(() => {
                        const secondIframe = videoContainers[1]?.querySelector('iframe');
                        if (secondIframe && secondIframe.src) {
                            secondVideoReady = true;
                            clearInterval(checkSecondInterval);
                            maybeShowTapScreen();
                        }
                    }, 200);
                }

                setupVideoObserver();
                setTimeout(() => {
                    const visibleIdx = getVisibleIndex();
                    currentVisibleIndex = visibleIdx;
                    previousVisibleIndex = visibleIdx;
                    updateBufferWindow(visibleIdx);
                }, 500);

            } catch (error) {
                console.error('Error loading feed:', error);
                loadingEl.innerHTML = '<p style="color:red;">Failed to load videos. Check console.</p>';
            }
        }

        function setupVideoObserver() {
            class VideoPlayerManager {
                constructor() {
                    this.observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            const container = entry.target;
                            const idx = videoContainers.indexOf(container);

                            if (entry.isIntersecting && idx !== -1) {
                                if (idx !== previousVisibleIndex) {
                                    if (previousVisibleIndex !== -1) {
                                        pauseVideo(videoContainers[previousVisibleIndex]);
                                    }
                                    playVideo(container);
                                    if (userInteracted) unmuteVideo(container);
                                    updateBufferWindow(idx);
                                    previousVisibleIndex = idx;
                                    currentVisibleIndex = idx;
                                }
                            }
                        });
                    }, {
                        threshold: 0.7,
                        rootMargin: "100px 0px"
                    });
                }
                observe(el) { this.observer.observe(el); }
            }
            videoPlayerManager = new VideoPlayerManager();
            videoContainers.forEach(c => videoPlayerManager.observe(c));
        }

        function loadLiveStories() {
            const lives = [{ name: 'Goa Shorts', icon: '📱' }, { name: 'Beach Life', icon: '🌊' }, { name: 'Foodie', icon: '🍛' }, { name: 'Travel', icon: '✈️' }];
            liveStories.innerHTML = '';
            lives.forEach(live => {
                const story = document.createElement('div');
                story.className = 'story-item';
                story.innerHTML = `<div class="story-avatar live"><div class="story-avatar-inner">${live.icon}</div></div><div class="story-label">${live.name}</div>`;
                liveStories.appendChild(story);
            });
        }

        loadLiveStories();
        loadFeed();

        window.addEventListener('popstate', () => {
            const videoId = new URLSearchParams(window.location.search).get('v');
            if (videoId) { youtubePlayerContainer.classList.add('active'); youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`; }
            else { youtubePlayerContainer.classList.remove('active'); youtubePlayer.src = ''; }
        });

        splashOverlay.addEventListener('click', function onSplashTap(e) {
            if (splashOverlay.classList.contains('tappable')) {
                startApp();
            }
        });
    </script>
</body>
</html>
