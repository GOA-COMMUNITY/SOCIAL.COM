        /* ===== OFFLINE BANNER ===== */
        .offline-banner {
            background: #f23b5c;

            justify-content: center;
        }
        .event-modal.show { display: flex; }
        .event-card {
            background: white;

            max-width: 350px;
            width: 90%;
            text-align: center;

            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .event-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            color: #ff8c42;
        }
        .event-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1c1e21;

        .event-countdown {

        }
        .event-close {

            padding: 14px 30px;

            width: 100%;
        }

        /* ===== INSTALL POPUP ===== */
        .install-popup {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: white;
            border-radius: 28px;
            padding: 24px;
            z-index: 10002;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid #e4e6eb;
            animation: slideUp 0.4s ease;
            max-width: 400px;
            margin: 0 auto;
            display: none;
        }
        .install-popup.show { display: block; }
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }

        .install-header {
            display: flex;
            align-items: center;

        }
        .install-icon {

            overflow: hidden;

<body>
    <!-- Coconut trees -->
    <div class="coconut-left">🌴</div>
    <div class="coconut-right">🌴</div>

    <!-- Offline Banner (hidden by default) -->
    <div class="offline-banner" id="offlineBanner">
        <i class="fas fa-wifi-slash"></i> You're offline – watching cached videos
    </div>

    <!-- Splash Screen (keep your existing splash HTML) -->
    <div class="splash-overlay" id="splashOverlay">...</div>

    <!-- Event Modal (POPUP) -->
    <div class="event-modal" id="eventModal">
        <div class="event-card">
            <div class="event-icon" id="eventIcon">🎉</div>
            <div class="event-name" id="eventName">Test Event</div>
            <div class="event-countdown" id="eventCountdown">0 days</div>
            <div class="event-desc" id="eventDesc">Description</div>
            <button class="event-close" id="closeEventBtn">Got it</button>
        </div>
    </div>

    <!-- Install Popup (PWA) -->
    <div class="install-popup" id="installPopup">
        <div class="install-header">
            <div class="install-icon">
                <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
            </div>
            <div>
                <div class="install-title">Install Goa Social</div>
                <div class="install-sub">Add to home screen for quick access</div>
            </div>
        </div>
        <div class="install-buttons">
            <button class="install-now" id="installNowBtn">Install</button>
            <button class="install-later" id="installLaterBtn">Later</button>
        </div>
    </div>

    <!-- Share Popup (keep your existing) -->
    <!-- ... -->

    <!-- YouTube Player Container -->
    <!-- ... -->

    <!-- Header -->
    <header class="app-header">...</header>

    <!-- Main content (feed, stories, categories) -->
    <div id="content">...</div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">...</nav>

    <script>
        // ========== DOM ELEMENTS ==========
        const eventModal = document.getElementById('eventModal');
        const eventIcon = document.getElementById('eventIcon');
        const eventName = document.getElementById('eventName');
        const eventCountdown = document.getElementById('eventCountdown');
        const eventDesc = document.getElementById('eventDesc');
        const closeEventBtn = document.getElementById('closeEventBtn');
        const installPopup = document.getElementById('installPopup');
        const installNowBtn = document.getElementById('installNowBtn');
        const installLaterBtn = document.getElementById('installLaterBtn');
        const offlineBanner = document.getElementById('offlineBanner');

        // App state
        let deferredPrompt = null;
        let installShown = false;
        let installDismissed = false;

        // ========== OFFLINE DETECTION ==========
        function updateOnlineStatus() {
            offlineBanner.classList.toggle('show', !navigator.onLine);
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        // ========== EVENT MODAL (from events.json) ==========
        async function checkEvents() {
            try {
                const res = await fetch('events.json');
                const events = await res.json();
                const today = new Date();
                today.setHours(0,0,0,0);

                // Find first upcoming event within 30 days (including today)
                for (let e of events) {
                    const eventDate = new Date(e.date);
                    eventDate.setHours(0,0,0,0);
                    const diffDays = Math.ceil((eventDate - today) / (86400000));
                    if (diffDays >= 0 && diffDays <= 30) {
                        showEventModal(e, diffDays);
                        return;
                    }
                }
            } catch (err) {
                console.log('No events.json or error', err);
            }
        }

        function showEventModal(event, days) {
            eventIcon.innerHTML = `<i class="fas ${event.icon || 'fa-calendar-alt'}"></i>`;
            eventName.textContent = event.name;
            eventCountdown.textContent = days === 0 ? 'TODAY!' : `${days} day${days > 1 ? 's' : ''}`;
            eventDesc.textContent = event.description || '';
            eventModal.classList.add('show');
        }

        closeEventBtn.addEventListener('click', () => {
            eventModal.classList.remove('show');
        });

        // Call it after feed loads (or immediately)
        checkEvents();

        // ========== PWA INSTALL LOGIC ==========
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;

            // Show after 30 seconds
            setTimeout(() => {
                if (deferredPrompt && !installShown && !window.matchMedia('(display-mode: standalone)').matches) {
                    installPopup.classList.add('show');
                    installShown = true;
                }
            }, 30000);

            // Show again after 1 minute if not installed and not dismissed?
            setTimeout(() => {
                if (deferredPrompt && !installShown && !window.matchMedia('(display-mode: standalone)').matches) {
                    installPopup.classList.add('show');
                    installShown = true;
                }
            }, 60000);
        });

        installNowBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                deferredPrompt = null;
                installPopup.classList.remove('show');
            }
        });

        installLaterBtn.addEventListener('click', () => {
            installPopup.classList.remove('show');
            installDismissed = true;
            // Optionally, you could set a flag to not show again, but we'll let it show again after 1 min if not dismissed?
        });

        // Fallback for non-supported browsers (iOS etc.)
        if (!('beforeinstallprompt' in window)) {
            // For iOS, you might want to show a custom instruction after some time.
            setTimeout(() => {
                if (!window.matchMedia('(display-mode: standalone)').matches) {
                    // Show a custom message (optional)
                }
            }, 30000);
        }

        // ========== YOUR EXISTING VIDEO FEED CODE ==========
        // (Keep all your existing video loading, hearts, shares, etc.)
        // ...
    </script>
