<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goa Social</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(145deg, #1877f2, #0a5cff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
        }
        .logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 3px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .message {
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            opacity: 0.9;
        }
    </style>
    <script>
        // Redirect to home.html after 1 second
        setTimeout(() => {
            window.location.replace("pages/home.html");
        }, 1000);
    </script>
</head>
<body>
    <div class="message">
        <div class="logo">
            <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
        </div>
        <h1>Goa Social</h1>
        <p>Loading your experience...</p>
    </div>
</body>
</html>
