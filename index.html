<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goa Social</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
}

body{
background:#000;
color:#fff;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#0a0a0a;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
}

.logo{
display:flex;
align-items:center;
gap:8px;
}

.logo-icon{
background:#ff7b42;
width:30px;
height:30px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
color:#000;
}

main{
flex:1;
overflow-y:auto;
padding:16px;
padding-bottom:120px;
}

.card{
background:#151515;
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #222;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#888;
font-size:12px;
background:none;
border:none;
}

.nav-item i{
font-size:22px;
margin-bottom:3px;
}

.nav-item.active{
color:#ff7b42;
}

</style>

</head>
<body>

<header>

<div class="logo">
<div class="logo-icon">
<i class="fas fa-umbrella-beach"></i>
</div>
<h2>Goa Social</h2>
</div>

<div>
<i class="fas fa-search"></i>
</div>

</header>

<main id="content"></main>

<nav class="bottom-nav">

<button class="nav-item active" onclick="loadHome()">
<i class="fas fa-home"></i>
<span>Home</span>
</button>

<button class="nav-item">
<i class="fas fa-heart"></i>
<span>Dating</span>
</button>

<button class="nav-item">
<i class="fas fa-store"></i>
<span>Business</span>
</button>

<button class="nav-item">
<i class="fas fa-comment"></i>
<span>Chats</span>
</button>

<button class="nav-item">
<i class="fas fa-user"></i>
<span>Profile</span>
</button>

</nav>

<script>

function loadHome(){

let content=document.getElementById("content")

content.innerHTML=`

<h2 style="margin-bottom:20px">Goa Video Feed</h2>

<div id="videoFeed"></div>

`

loadVideos()

}

function loadVideos(){

let container=document.getElementById("videoFeed")

const videos=[

"aqz-KE-bpKQ",
"dQw4w9WgXcQ",
"ScMzIvxBSi4",
"5qap5aO4i9A"

]

videos.forEach(id=>{

container.innerHTML+=`

<div class="card">

<div onclick="playVideo('${id}',this)" style="cursor:pointer">

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" style="width:100%">

</div>

</div>

`

})

}

function playVideo(id,el){

el.innerHTML=`

<iframe
width="100%"
height="220"
src="https://www.youtube.com/embed/${id}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>

`

}

loadHome()

</script>

</body>
</html>
