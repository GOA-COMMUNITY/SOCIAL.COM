<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            color: #1c1e21;
            line-height: 1.4;
            padding-bottom: 70px;
        }
        .coconut-left, .coconut-right {
            position: fixed;
            bottom: 80px;
            font-size: 4rem;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
            animation: sway 6s ease-in-out infinite;
        }
        .coconut-left { left: 10px; transform: rotate(-10deg); }
        .coconut-right { right: 10px; transform: rotate(10deg) scaleX(-1); }
        @keyframes sway {
            0%,100% { transform: rotate(-10deg); }
            50% { transform: rotate(-5deg); }
        }
        .app-header {
            background: white;
            backdrop-filter: blur(12px);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e6eb;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-crop {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            background: #1877f2;
        }
        .logo-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1877f2;
        }
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .feed-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card-header {
            display: flex;
            align-items: center;
            padding: 14px;
            gap: 12px;
        }
        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1877f2;
        }
        .video-container {
            width: 100%;
            aspect-ratio: 9/16;
            background: #000;
        }
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .card-footer {
            padding: 14px;
            display: flex;
            gap: 24px;
            border-top: 1px solid #e4e6eb;
        }
        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #65676b;
        }
        .footer-item i.fa-heart { color: #f23b5c; }
        .footer-item i.fa-comment { color: #1877f2; }
        .footer-item i.fa-share { color: #42b72a; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e4e6eb;
            display: flex;
            justify-content: space-around;
            padding: 8px 10px 12px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #65676b;
            font-size: 0.7rem;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .nav-item i { font-size: 1.5rem; }
        .nav-item.active { color: #1877f2; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #1877f2;
        }
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="coconut-left">🌴</div>
    <div class="coconut-right">🌴</div>

    <header class="app-header">
        <div class="logo-container">
            <div class="logo-crop">
                <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
            </div>
            <span class="logo-text">Goa Social</span>
        </div>
        <div class="header-actions">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <div class="feed-container" id="feedContainer">
        <div class="loading">
            <i class="fas fa-circle-notch"></i>
            <p>Loading videos...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item"><i class="fas fa-compass"></i><span>Explore</span></button>
        <button class="nav-item"><i class="fas fa-store"></i><span>Business</span></button>
        <button class="nav-item"><i class="fas fa-comment-dots"></i><span>Chats</span></button>
        <button class="nav-item"><i class="fas fa-user"></i><span>Profile</span></button>
    </nav>

    <script>
        const feedContainer = document.getElementById('feedContainer');

        async function loadVideos() {
            try {
                // Try direct URL first
                const response = await fetch('https://goa-community.github.io/SOCIAL.COM/videos.json');
                
                if (!response.ok) throw new Error('Failed to fetch');
                
                const videos = await response.json();
                
                // Clear loading
                feedContainer.innerHTML = '';
                
                // Add videos
                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'feed-card';
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="channel-icon">📺</div>
                            <div class="channel-info">
                                <div style="font-weight:600;">${video.channelName || 'Goa Shorts'}</div>
                                <div style="font-size:0.7rem; color:#65676b;">Shorts</div>
                            </div>
                            <i class="fas fa-ellipsis-h"></i>
                        </div>
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/${video.videoId}?autoplay=0&mute=1&controls=0&playsinline=1" allow="fullscreen"></iframe>
                        </div>
                        <div class="card-footer">
                            <span class="footer-item"><i class="fas fa-heart"></i> 1.2k</span>
                            <span class="footer-item"><i class="fas fa-comment"></i> 89</span>
                            <span class="footer-item"><i class="fas fa-share"></i> Share</span>
                        </div>
                    `;
                    feedContainer.appendChild(card);
                });
                
            } catch (error) {
                feedContainer.innerHTML = `<div style="color:red; padding:40px; text-align:center;">Error: ${error.message}</div>`;
            }
        }

        loadVideos();
    </script>
</body>
</html>
