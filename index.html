<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Goa Social</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

header{
background:#0a0a0a;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.main{
padding:16px;
padding-bottom:90px;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
display:flex;
justify-content:space-around;
padding:10px;
}

.bottom button{
background:none;
border:none;
color:white;
font-size:14px;
}

.content-pane img{
width:100%;
border-radius:18px;
}

.card{
margin-bottom:20px;
}

</style>

</head>

<body>

<header>

<h2>🏖 Goa Social</h2>

</header>

<div class="main" id="content"></div>

<div class="bottom">

<button onclick="loadPage('home')">Home</button>
<button onclick="loadPage('dating')">Dating</button>
<button onclick="loadPage('business')">Business</button>
<button onclick="loadPage('chats')">Chats</button>
<button onclick="loadPage('profile')">Profile</button>

</div>

<script>

async function loadPage(page){

let res = await fetch("pages/"+page+".html")

let html = await res.text()

document.getElementById("content").innerHTML = html

if(page==="home"){
loadVideos()
}

}

function loadVideos(){

let container = document.getElementById("videoFeed")

if(!container) return

const videos = [

"aqz-KE-bpKQ",
"dQw4w9WgXcQ",
"ScMzIvxBSi4"

]

videos.forEach(id=>{

container.innerHTML += `

<div class="card">

<div onclick="playVideo('${id}',this)">

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">

</div>

</div>

`

})

}

function playVideo(id,el){

el.innerHTML = `

<iframe
width="100%"
height="220"
src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1"
frameborder="0"
allowfullscreen>

</iframe>

`

}

loadPage("home")

</script>

</body>
</html>
