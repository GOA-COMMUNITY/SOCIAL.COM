<!-- Stories -->
<div class="stories-section">
    <div class="section-header"><h3>LIVE NOW</h3><a href="#">View all <i class="fas fa-chevron-right"></i></a></div>
    <div class="stories-scroll" id="liveStories"></div>
</div>

<!-- Categories -->
<div class="categories-section">
    <div class="chips-scroll">
        <span class="chip active">All</span> <span class="chip">Trending</span> <span class="chip">Local</span>
        <span class="chip">News</span> <span class="chip">Shorts</span> <span class="chip">Events</span>
        <span class="chip">Food</span> <span class="chip">Travel</span>
    </div>
</div>

<!-- Main Feed -->
<div class="feed-container" id="feedContainer">
    <div class="loading-indicator" id="loading"><i class="fas fa-circle-notch"></i><p>Loading videos...</p></div>
</div>

<style>
    .stories-section {
        padding: 16px;
        background: white;
        margin: 8px 0;
    }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
    }
    .section-header h3 { font-size: 1.1rem; font-weight: 600; }
    .section-header a { color: #1877f2; text-decoration: none; }
    .stories-scroll {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        padding-bottom: 4px;
    }
    .story-item { min-width: 90px; text-align: center; }
    .story-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(145deg, #e4e6eb, #d8dade);
        margin: 0 auto 8px;
        border: 3px solid #1877f2;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
    }
    .story-label { font-size: 0.75rem; color: #65676b; }
    
    .categories-section {
        padding: 12px 16px;
        background: white;
        margin: 8px 0;
    }
    .chips-scroll {
        display: flex;
        gap: 10px;
        overflow-x: auto;
    }
    .chip {
        background: #f0f2f5;
        padding: 8px 18px;
        border-radius: 40px;
        font-size: 0.85rem;
        white-space: nowrap;
    }
    .chip.active {
        background: #1877f2;
        color: white;
    }
    
    .feed-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 8px 0;
    }
    .feed-card {
        background: white;
        border-radius: 16px;
        margin: 0 12px 16px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card-header {
        display: flex;
        align-items: center;
        padding: 14px;
        gap: 12px;
    }
    .channel-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: #f0f2f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
        color: #1877f2;
    }
    .channel-info { flex: 1; }
    .channel-name { font-weight: 600; }
    .post-time { font-size: 0.7rem; color: #65676b; }
    .video-container {
        position: relative;
        width: 100%;
        aspect-ratio: 9/16;
        background: #000;
    }
    .video-container iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
    .video-info-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 30px 14px 14px;
        background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        color: white;
    }
    .video-title-small { font-size: 0.9rem; font-weight: 600; }
    .video-meta { font-size: 0.7rem; color: #ccc; }
    .card-footer {
        padding: 14px;
        display: flex;
        gap: 24px;
        border-top: 1px solid #e4e6eb;
    }
    .footer-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #65676b;
        cursor: pointer;
    }
    .footer-item i.fa-heart { color: #f23b5c; }
    .footer-item i.fa-comment { color: #1877f2; }
    .footer-item i.fa-share { color: #42b72a; }
    .loading-indicator {
        text-align: center;
        padding: 30px;
        color: #1877f2;
    }
    .loading-indicator i {
        font-size: 2rem;
        animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>

<script>
    const feedContainer = document.getElementById('feedContainer');
    const loadingEl = document.getElementById('loading');
    const liveStories = document.getElementById('liveStories');

    // Simple stories
    const lives = [
        { name: 'Goa Shorts', icon: '📱' },
        { name: 'Beach Life', icon: '🌊' },
        { name: 'Foodie', icon: '🍛' },
        { name: 'Travel', icon: '✈️' }
    ];
    liveStories.innerHTML = '';
    lives.forEach(live => {
        const story = document.createElement('div');
        story.className = 'story-item';
        story.innerHTML = `<div class="story-avatar">${live.icon}</div><div class="story-label">${live.name}</div>`;
        liveStories.appendChild(story);
    });

    // Load videos
    async function loadVideos() {
        try {
            const response = await fetch('videos.json');
            const videos = await response.json();
            
            loadingEl.style.display = 'none';
            
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'feed-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">📺</div>
                        <div class="channel-info">
                            <div class="channel-name">${video.channelName || 'Goa Shorts'}</div>
                            <div class="post-time">Shorts</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/${video.videoId}?autoplay=0&mute=1&controls=0&playsinline=1" allow="fullscreen"></iframe>
                        <div class="video-info-overlay">
                            <div class="video-title-small">Goa Short</div>
                            <div class="video-meta"><span>#Shorts</span></div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-heart"></i> 1.2k</span>
                        <span class="footer-item"><i class="fas fa-comment"></i> 89</span>
                        <span class="footer-item"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
                feedContainer.appendChild(card);
            });
        } catch (error) {
            loadingEl.innerHTML = `<p style="color:red;">Error loading videos: ${error.message}</p>`;
        }
    }

    loadVideos();
</script>
